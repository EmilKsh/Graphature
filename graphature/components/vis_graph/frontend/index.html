<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="./lib/vis-network.css" />
    <script src="./lib/vis-network.min.js"></script>
    <style>
      :root {
        color-scheme: light;
      }

      html,
      body {
        height: 100%;
        margin: 0;
        overflow: hidden;
        background: #ffffff;
        font-family: Inter, "Segoe UI", Arial, sans-serif;
      }

      body.dark {
        background: #0b1120;
        color-scheme: dark;
      }

      #graph {
        position: relative;
        height: 760px;
        width: 100%;
        overflow: hidden;
        background: #ffffff;
        border: 1px solid #dbe3ec;
        border-radius: 8px;
        box-sizing: border-box;
      }

      body.dark #graph {
        background: #0b1120;
        border-color: #334155;
      }

      #network {
        height: 100%;
        width: 100%;
      }

      #selection-box {
        display: none;
        position: absolute;
        pointer-events: none;
        border: 1px solid rgba(59, 130, 246, 0.95);
        background: rgba(59, 130, 246, 0.16);
        z-index: 5;
      }

      #graph-legend {
        display: none;
        position: absolute;
        top: 10px;
        left: 10px;
        z-index: 6;
        max-width: min(148px, calc(100% - 88px));
        max-height: 34px;
        overflow: hidden;
        flex-direction: column;
        gap: 0;
        padding: 8px;
        border: 1px solid rgba(203, 213, 225, 0.92);
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.9);
        box-shadow: 0 10px 24px rgba(15, 23, 42, 0.08);
        backdrop-filter: blur(8px);
        box-sizing: border-box;
        color: #0f172a;
        cursor: default;
        transition:
          max-width 160ms ease,
          max-height 160ms ease,
          background 160ms ease,
          box-shadow 160ms ease;
      }

      body.dark #graph-legend {
        border-color: rgba(148, 163, 184, 0.38);
        background: rgba(15, 23, 42, 0.82);
        color: #f8fafc;
      }

      #graph-legend:hover {
        max-width: min(320px, calc(100% - 88px));
        max-height: calc(100% - 24px);
        overflow-y: auto;
        gap: 6px;
        box-shadow: 0 14px 30px rgba(15, 23, 42, 0.14);
      }

      .legend-title {
        overflow: hidden;
        padding: 0 2px;
        color: #075985;
        font-size: 11px;
        font-weight: 800;
        letter-spacing: 0.03em;
        text-transform: uppercase;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      body.dark .legend-title {
        color: #bae6fd;
      }

      .legend-item {
        display: grid;
        grid-template-columns: 10px minmax(0, 1fr) auto;
        align-items: center;
        gap: 7px;
        min-height: 24px;
        padding: 4px 7px;
        border: 1px solid rgba(219, 234, 254, 0.95);
        border-radius: 999px;
        background: rgba(248, 251, 255, 0.92);
        font-size: 12px;
        line-height: 1.15;
      }

      #graph-legend:not(:hover) .legend-item {
        display: none;
      }

      body.dark .legend-item {
        border-color: rgba(148, 163, 184, 0.24);
        background: rgba(30, 41, 59, 0.88);
      }

      .legend-swatch {
        width: 9px;
        height: 9px;
        border: 1px solid rgba(15, 23, 42, 0.14);
        border-radius: 999px;
      }

      .legend-label {
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .legend-count {
        color: #075985;
        font-weight: 800;
      }

      body.dark .legend-count {
        color: #bae6fd;
      }

      #recenter-button {
        position: absolute;
        top: auto;
        right: 10px;
        bottom: 10px;
        z-index: 6;
        height: 30px;
        min-width: 38px;
        border: 1px solid #bfdbfe;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.88);
        color: #075985;
        font-size: 12px;
        font-weight: 700;
        letter-spacing: 0;
        line-height: 1;
        box-shadow: 0 6px 16px rgba(15, 23, 42, 0.08);
        cursor: pointer;
        backdrop-filter: blur(8px);
      }

      #recenter-button:hover {
        background: #e0f2fe;
        border-color: #7dd3fc;
      }

      body.dark #recenter-button {
        border-color: rgba(125, 211, 252, 0.52);
        background: rgba(15, 23, 42, 0.86);
        color: #bae6fd;
        box-shadow: 0 8px 20px rgba(0, 0, 0, 0.26);
      }

      body.dark #recenter-button:hover {
        background: rgba(22, 78, 99, 0.92);
        border-color: #38bdf8;
        color: #e0f2fe;
      }

      #recenter-button:focus {
        outline: 2px solid #bae6fd;
        outline-offset: 2px;
      }
    </style>
  </head>
  <body>
    <div id="graph">
      <div id="network"></div>
      <div id="selection-box"></div>
      <div id="graph-legend" aria-label="Graph color legend"></div>
      <button id="recenter-button" type="button" title="Fit graph to view" aria-label="Fit graph to view">
        Fit
      </button>
    </div>
    <script>
      const READY = "streamlit:componentReady";
      const RENDER = "streamlit:render";
      const SET_VALUE = "streamlit:setComponentValue";
      const SET_HEIGHT = "streamlit:setFrameHeight";
      const container = document.getElementById("graph");
      const networkContainer = document.getElementById("network");
      const selectionBox = document.getElementById("selection-box");
      const legendContainer = document.getElementById("graph-legend");
      const recenterButton = document.getElementById("recenter-button");
      const CENTER_NODE_ID = "__graphature_center_anchor__";
      const CENTER_EDGE_PREFIX = "__graphature_center_edge__";

      let network = null;
      let nodes = new vis.DataSet([]);
      let edges = new vis.DataSet([]);
      let selectedIds = [];
      let shiftSelecting = false;
      let dragStart = null;
      let currentGraphKey = null;
      let lastRenderArgs = null;
      let resizeFrame = null;
      let lastContainmentAt = 0;

      function sendMessage(type, payload) {
        window.parent.postMessage({ isStreamlitMessage: true, type, ...payload }, "*");
      }

      function setFrameHeight(height) {
        sendMessage(SET_HEIGHT, { height });
      }

      function setValue(value) {
        sendMessage(SET_VALUE, { value });
      }

      function componentReady() {
        sendMessage(READY, { apiVersion: 1 });
      }

      function normalizeSelected(ids) {
        return Array.from(new Set((ids || []).map(String).filter((id) => id !== CENTER_NODE_ID)));
      }

      function updateValue() {
        setValue({ selected_ids: selectedIds, event_id: Date.now() });
      }

      function syncSelection(ids, publish = true) {
        selectedIds = normalizeSelected(ids);
        if (network) {
          network.selectNodes(selectedIds, false);
        }
        if (publish) {
          updateValue();
        }
      }

      function numberArg(value, fallback) {
        const parsed = Number(value);
        return Number.isFinite(parsed) ? parsed : fallback;
      }

      function viewportHeight(args) {
        const fallback = numberArg(args.height, 760);
        if (!args.fill_viewport) {
          return fallback;
        }

        const minHeight = numberArg(args.min_height, 560);
        const bottomMargin = numberArg(args.bottom_margin, 14);
        const viewportScale = Math.max(0.2, Math.min(1, numberArg(args.viewport_scale, 1)));
        let parentHeight = fallback;
        let frameTop = 0;

        try {
          parentHeight = window.parent.innerHeight || fallback;
          frameTop = window.frameElement ? window.frameElement.getBoundingClientRect().top : 0;
        } catch {
          parentHeight = window.innerHeight || fallback;
        }

        const available = Math.floor((parentHeight - frameTop - bottomMargin) * viewportScale);
        return Math.max(minHeight, available > 0 ? available : fallback);
      }

      function applyHeight(height) {
        container.style.height = `${height}px`;
        networkContainer.style.height = `${height}px`;
        setFrameHeight(height);
        if (network) {
          network.redraw();
        }
      }

      function scheduleViewportResize() {
        if (!lastRenderArgs || !lastRenderArgs.fill_viewport) {
          return;
        }
        if (resizeFrame) {
          window.cancelAnimationFrame(resizeFrame);
        }
        resizeFrame = window.requestAnimationFrame(() => {
          resizeFrame = null;
          applyHeight(viewportHeight(lastRenderArgs));
        });
      }

      function scheduleNetworkResize() {
        if (resizeFrame) {
          window.cancelAnimationFrame(resizeFrame);
        }
        resizeFrame = window.requestAnimationFrame(() => {
          resizeFrame = null;
          if (lastRenderArgs && lastRenderArgs.fill_viewport) {
            applyHeight(viewportHeight(lastRenderArgs));
          }
          if (network) {
            network.setSize("100%", `${container.clientHeight}px`);
            network.redraw();
          }
        });
      }

      function scrollParentPage(deltaX, deltaY) {
        try {
          const parentDocument = window.parent.document;
          const candidates = [
            parentDocument.querySelector('[data-testid="stAppViewContainer"]'),
            parentDocument.querySelector('[data-testid="stMain"]'),
            parentDocument.querySelector('section.main'),
            parentDocument.scrollingElement,
            parentDocument.documentElement,
          ].filter(Boolean);
          const target =
            candidates.find((element) => element.scrollHeight > element.clientHeight + 4) ||
            parentDocument.scrollingElement ||
            parentDocument.documentElement;
          if (typeof target.scrollBy === "function") {
            target.scrollBy({ left: deltaX, top: deltaY, behavior: "auto" });
          } else {
            target.scrollLeft += deltaX;
            target.scrollTop += deltaY;
          }
        } catch {
          window.parent.postMessage({ type: "graphature:scrollPage", deltaX, deltaY }, "*");
        }
      }

      function zoomGraph(event) {
        if (!network) {
          return;
        }
        const currentScale = network.getScale();
        const factor = Math.exp(-event.deltaY * 0.0015);
        const nextScale = Math.max(0.08, Math.min(6, currentScale * factor));
        network.moveTo({ scale: nextScale, animation: false });
      }

      function fitGraph() {
        if (!network) {
          return;
        }
        network.fit({
          animation: {
            duration: 360,
            easingFunction: "easeInOutQuad",
          },
        });
      }

      function centerSpringLength(nodeCount) {
        return Math.max(360, Math.min(760, 260 + Math.sqrt(Math.max(1, nodeCount)) * 42));
      }

      function containmentRadius(nodeCount) {
        return Math.max(560, Math.min(1800, 360 + Math.sqrt(Math.max(1, nodeCount)) * 92));
      }

      function withCenterAnchor(nodeRows, edgeRows) {
        const realNodes = Array.isArray(nodeRows) ? nodeRows : [];
        const realEdges = Array.isArray(edgeRows) ? edgeRows : [];
        if (realNodes.length === 0) {
          return { nodes: realNodes, edges: realEdges };
        }

        const centerNode = {
          id: CENTER_NODE_ID,
          label: "",
          shape: "dot",
          size: 1,
          x: 0,
          y: 0,
          fixed: { x: true, y: true },
          physics: false,
          borderWidth: 0,
          color: {
            background: "rgba(0, 0, 0, 0)",
            border: "rgba(0, 0, 0, 0)",
            highlight: { background: "rgba(0, 0, 0, 0)", border: "rgba(0, 0, 0, 0)" },
          },
          font: { size: 0 },
          chosen: false,
        };
        const length = centerSpringLength(realNodes.length);
        const anchorEdges = realNodes.map((node) => ({
          id: `${CENTER_EDGE_PREFIX}${String(node.id)}`,
          from: CENTER_NODE_ID,
          to: String(node.id),
          length,
          physics: true,
          smooth: false,
          width: 0,
          selectionWidth: 0,
          hoverWidth: 0,
          color: {
            color: "rgba(0, 0, 0, 0)",
            highlight: "rgba(0, 0, 0, 0)",
            hover: "rgba(0, 0, 0, 0)",
          },
          title: "",
          chosen: false,
        }));

        return { nodes: [...realNodes, centerNode], edges: [...realEdges, ...anchorEdges] };
      }

      function realNodeIds() {
        return nodes.getIds().map(String).filter((id) => id !== CENTER_NODE_ID);
      }

      function containEscapedNodes(force = false) {
        if (!network) {
          return;
        }
        const now = Date.now();
        if (!force && now - lastContainmentAt < 280) {
          return;
        }
        lastContainmentAt = now;

        const ids = realNodeIds();
        const radius = containmentRadius(ids.length);
        const positions = network.getPositions(ids);
        let moved = false;

        ids.forEach((id) => {
          const position = positions[id];
          if (!position) {
            return;
          }
          const distance = Math.hypot(position.x, position.y);
          if (distance <= radius || distance === 0) {
            return;
          }
          const scale = radius / distance;
          network.moveNode(id, position.x * scale, position.y * scale);
          moved = true;
        });

        if (moved) {
          network.redraw();
        }
      }

      function drawReadMarkers(ctx) {
        if (!network) {
          return;
        }
        nodes.get().forEach((node) => {
          if (node.id === CENTER_NODE_ID || !node.read_status) {
            return;
          }
          const position = network.getPosition(node.id);
          if (!position) {
            return;
          }

          const nodeRadius = numberArg(node.size, 18);
          const markerRadius = Math.max(5.5, Math.min(8.5, nodeRadius * 0.34));
          const x = position.x + nodeRadius * 0.72;
          const y = position.y - nodeRadius * 0.72;

          ctx.save();
          ctx.beginPath();
          ctx.arc(x, y, markerRadius, 0, Math.PI * 2);
          ctx.fillStyle = "#22c55e";
          ctx.fill();
          ctx.lineWidth = 1.2;
          ctx.strokeStyle = "rgba(255, 255, 255, 0.95)";
          ctx.stroke();

          ctx.beginPath();
          ctx.moveTo(x - markerRadius * 0.44, y - markerRadius * 0.02);
          ctx.lineTo(x - markerRadius * 0.12, y + markerRadius * 0.34);
          ctx.lineTo(x + markerRadius * 0.5, y - markerRadius * 0.38);
          ctx.lineCap = "round";
          ctx.lineJoin = "round";
          ctx.lineWidth = Math.max(1.6, markerRadius * 0.24);
          ctx.strokeStyle = "#ffffff";
          ctx.stroke();
          ctx.restore();
        });
      }

      function renderLegend(rows, title) {
        legendContainer.replaceChildren();
        if (!Array.isArray(rows) || rows.length === 0) {
          legendContainer.style.display = "none";
          return;
        }

        const titleNode = document.createElement("div");
        titleNode.className = "legend-title";
        titleNode.textContent = `${title || "Legend"} (${rows.length})`;
        legendContainer.appendChild(titleNode);

        rows.forEach((row) => {
          const item = document.createElement("div");
          item.className = "legend-item";
          item.title = String(row.label || "");

          const swatch = document.createElement("span");
          swatch.className = "legend-swatch";
          swatch.style.background = String(row.color || "#94a3b8");

          const label = document.createElement("span");
          label.className = "legend-label";
          label.textContent = String(row.label || "Unlabeled");

          const count = document.createElement("span");
          count.className = "legend-count";
          count.textContent = String(row.count ?? "");

          item.append(swatch, label, count);
          legendContainer.appendChild(item);
        });

        legendContainer.style.display = "flex";
      }

      function eventPoint(event) {
        const rect = networkContainer.getBoundingClientRect();
        return {
          dom: { x: event.clientX - rect.left, y: event.clientY - rect.top },
          page: { x: event.clientX, y: event.clientY },
        };
      }

      function setBox(start, current) {
        const left = Math.min(start.dom.x, current.dom.x);
        const top = Math.min(start.dom.y, current.dom.y);
        const width = Math.abs(start.dom.x - current.dom.x);
        const height = Math.abs(start.dom.y - current.dom.y);
        selectionBox.style.display = "block";
        selectionBox.style.left = `${left}px`;
        selectionBox.style.top = `${top}px`;
        selectionBox.style.width = `${width}px`;
        selectionBox.style.height = `${height}px`;
      }

      function finishBoxSelection(event) {
        if (!shiftSelecting || !network || !dragStart) {
          return;
        }
        const dragEnd = eventPoint(event);
        const startCanvas = network.DOMtoCanvas(dragStart.dom);
        const endCanvas = network.DOMtoCanvas(dragEnd.dom);
        const minX = Math.min(startCanvas.x, endCanvas.x);
        const maxX = Math.max(startCanvas.x, endCanvas.x);
        const minY = Math.min(startCanvas.y, endCanvas.y);
        const maxY = Math.max(startCanvas.y, endCanvas.y);
        const dx = Math.abs(dragEnd.dom.x - dragStart.dom.x);
        const dy = Math.abs(dragEnd.dom.y - dragStart.dom.y);
        const next = new Set(selectedIds);

        if (dx < 6 && dy < 6) {
          const clickedNode = network.getNodeAt(dragEnd.dom);
          if (clickedNode) {
            const id = String(clickedNode);
            if (next.has(id)) {
              next.delete(id);
            } else {
              next.add(id);
            }
          }
        } else {
          const positions = network.getPositions();
          Object.entries(positions).forEach(([id, pos]) => {
            if (id === CENTER_NODE_ID) {
              return;
            }
            if (pos.x >= minX && pos.x <= maxX && pos.y >= minY && pos.y <= maxY) {
              next.add(String(id));
            }
          });
        }

        selectionBox.style.display = "none";
        shiftSelecting = false;
        dragStart = null;
        syncSelection(Array.from(next));
      }

      function render(args) {
        lastRenderArgs = args;
        const height = viewportHeight(args);
        const theme = args.theme || "light";
        document.body.classList.toggle("dark", theme === "dark");
        applyHeight(height);
        renderLegend(args.legend || [], args.legend_title || "Legend");

        if (network && args.graph_key && args.graph_key === currentGraphKey) {
          syncSelection(args.selected_ids || [], false);
          return;
        }

        currentGraphKey = args.graph_key || null;
        const anchoredGraph = withCenterAnchor(args.nodes || [], args.edges || []);
        nodes = new vis.DataSet(anchoredGraph.nodes);
        edges = new vis.DataSet(anchoredGraph.edges);
        selectedIds = normalizeSelected(args.selected_ids || []);

        const options = {
          autoResize: true,
          interaction: {
            dragNodes: true,
            dragView: true,
            hover: true,
            keyboard: false,
            multiselect: true,
            navigationButtons: false,
            selectable: true,
            selectConnectedEdges: false,
            tooltipDelay: 120,
            zoomView: false,
          },
          physics: {
            enabled: true,
            solver: "barnesHut",
            barnesHut: {
              gravitationalConstant: -2800,
              centralGravity: 0.62,
              springLength: 118,
              springConstant: 0.05,
              damping: 0.3,
              avoidOverlap: 0.14,
            },
            stabilization: { enabled: true, iterations: 340, fit: true },
            minVelocity: 0.18,
          },
          nodes: {
            shape: "dot",
            font: {
              size: 15,
              face: "Inter, Segoe UI, Arial",
              color: theme === "dark" ? "#f8fafc" : "#1f2933",
              strokeWidth: theme === "dark" ? 3 : 2,
              strokeColor: theme === "dark" ? "#0f172a" : "#ffffff",
            },
            borderWidth: 1.4,
            borderWidthSelected: 4,
            shadow: false,
          },
          edges: {
            color:
              theme === "dark"
                ? { color: "rgba(226, 232, 240, 0.56)", highlight: "#e0f2fe", hover: "#bae6fd" }
                : { color: "rgba(96, 165, 250, 0.34)", highlight: "#0284c7", hover: "#0ea5e9" },
            smooth: { type: "dynamic" },
            selectionWidth: 1,
          },
        };

        if (network) {
          network.destroy();
        }
        network = new vis.Network(networkContainer, { nodes, edges }, options);
        window.graphatureNetwork = network;
        window.graphatureNodes = nodes;
        window.graphatureEdges = edges;
        window.graphatureSyncSelection = syncSelection;
        syncSelection(selectedIds, false);

        network.on("afterDrawing", drawReadMarkers);
        network.on("stabilizationProgress", () => containEscapedNodes(false));
        network.once("stabilized", () => containEscapedNodes(true));
        network.on("dragEnd", () => containEscapedNodes(false));

        network.on("click", (params) => {
          const sourceEvent = params.event && params.event.srcEvent;
          if (sourceEvent && sourceEvent.shiftKey) {
            return;
          }

          if (params.nodes && params.nodes.length > 0) {
            const clickedId = String(params.nodes[0]);
            if (selectedIds.length === 1 && selectedIds[0] === clickedId) {
              syncSelection([]);
            } else {
              syncSelection([clickedId]);
            }
          } else {
            syncSelection([]);
          }
        });

        applyHeight(height);
      }

      window.addEventListener("resize", scheduleNetworkResize);
      if (window.ResizeObserver) {
        const graphResizeObserver = new ResizeObserver(scheduleNetworkResize);
        graphResizeObserver.observe(document.documentElement);
        graphResizeObserver.observe(container);
      }

      container.addEventListener(
        "wheel",
        (event) => {
          if (event.ctrlKey) {
            event.preventDefault();
            zoomGraph(event);
            return;
          }

          event.preventDefault();
          scrollParentPage(event.deltaX, event.deltaY);
        },
        { passive: false },
      );

      recenterButton.addEventListener("click", (event) => {
        event.preventDefault();
        event.stopPropagation();
        fitGraph();
      });

      recenterButton.addEventListener("mousedown", (event) => {
        event.stopPropagation();
      });

      legendContainer.addEventListener("click", (event) => {
        event.stopPropagation();
      });

      legendContainer.addEventListener("mousedown", (event) => {
        event.stopPropagation();
      });

      legendContainer.addEventListener(
        "wheel",
        (event) => {
          event.stopPropagation();
        },
        { passive: true },
      );

      container.addEventListener(
        "mousedown",
        (event) => {
          if (!event.shiftKey || event.button !== 0 || !network) {
            return;
          }
          event.preventDefault();
          event.stopPropagation();
          shiftSelecting = true;
          dragStart = eventPoint(event);
          setBox(dragStart, dragStart);
        },
        true,
      );

      window.addEventListener(
        "mousemove",
        (event) => {
          if (!shiftSelecting || !dragStart) {
            return;
          }
          event.preventDefault();
          setBox(dragStart, eventPoint(event));
        },
        true,
      );

      window.addEventListener(
        "mouseup",
        (event) => {
          if (!shiftSelecting) {
            return;
          }
          event.preventDefault();
          event.stopPropagation();
          finishBoxSelection(event);
        },
        true,
      );

      window.addEventListener("message", (event) => {
        if (event.data.type === RENDER) {
          render(event.data.args || {});
        }
      });

      componentReady();
    </script>
  </body>
</html>
